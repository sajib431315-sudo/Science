<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science & Technology — Lessons 1–19</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --ink: #1a1612;
  --ink2: #5a5248;
  --ink3: #9a9088;
  --accent: #c0392b;
  --accent2: #2980b9;
  --accent3: #27ae60;
  --accent4: #8e44ad;
  --accent5: #d35400;
  --border: rgba(26,22,18,0.1);
  --shadow: 0 2px 20px rgba(26,22,18,0.08);
  --radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ─── HEADER ─── */
header{background:var(--ink);color:#fff;padding:0 2.5rem;position:sticky;top:0;z-index:200;height:60px;display:flex;align-items:center;gap:2rem;box-shadow:0 2px 16px rgba(0,0,0,.25);}
.logo{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:900;color:#fff;text-decoration:none;display:flex;align-items:center;gap:10px;white-space:nowrap;}
.logo em{color:#f39c12;font-style:normal;}
.header-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;flex:1;max-width:320px;}
.header-search input{background:none;border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:.875rem;outline:none;width:100%;}
.header-search input::placeholder{color:rgba(255,255,255,.45);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-add{display:flex;align-items:center;gap:6px;background:#f39c12;color:var(--ink);border:none;border-radius:7px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-add:hover{opacity:.85;}

/* ─── HERO BAND ─── */
.hero-band{background:linear-gradient(135deg,#1a1612 60%,#2c2318 100%);padding:3rem 2.5rem 2.5rem;position:relative;overflow:hidden;}
.hero-band::before{content:'';position:absolute;right:-80px;top:-80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(243,156,18,.12) 0%,transparent 70%);}
.hero-band::after{content:'SCIENCE & TECHNOLOGY';position:absolute;right:2rem;bottom:-1.2rem;font-family:'Fraunces',serif;font-size:5rem;font-weight:900;color:rgba(255,255,255,.04);white-space:nowrap;pointer-events:none;}
.hero-band h1{font-family:'Fraunces',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;color:#fff;line-height:1.1;margin-bottom:.6rem;}
.hero-band h1 span{color:#f39c12;}
.hero-band p{color:rgba(255,255,255,.55);font-size:.95rem;max-width:500px;line-height:1.65;margin-bottom:1.8rem;}
.hero-stats{display:flex;gap:2rem;flex-wrap:wrap;}
.hstat{text-align:left;}
.hstat-n{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:#f39c12;}
.hstat-l{font-size:.75rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;}

/* ─── SUBJECT FILTER ─── */
.filter-row{padding:1.2rem 2.5rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;position:sticky;top:60px;z-index:150;}
.subj-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .18s;}
.subj-btn:hover{border-color:var(--ink2);color:var(--ink);}
.subj-btn.active{color:#fff;border-color:transparent;}
.subj-btn[data-s="all"].active{background:var(--ink);}
.subj-btn[data-s="physics"].active{background:#2980b9;}
.subj-btn[data-s="chemistry"].active{background:#c0392b;}
.subj-btn[data-s="biology"].active{background:#27ae60;}
.subj-btn[data-s="math"].active{background:#8e44ad;}
.subj-btn[data-s="technology"].active{background:#d35400;}
.filter-count{margin-left:auto;font-size:.78rem;color:var(--ink3);}

/* ─── RESOURCE TYPE FILTER ─── */
.type-filter{padding:.8rem 2.5rem;background:var(--bg);border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}
.type-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .18s;}
.type-btn:hover{color:var(--ink);}
.type-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ─── LESSON GRID ─── */
.lessons-wrap{padding:2rem 2.5rem 4rem;}
.section-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--ink3);margin-bottom:1.2rem;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.1rem;}

/* ─── LESSON CARD ─── */
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .22s,box-shadow .22s;position:relative;}
.lesson-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);}
.card-stripe{height:4px;width:100%;}
.card-inner{padding:1.1rem 1.2rem .9rem;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.lesson-number{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;line-height:1;color:rgba(26,22,18,.08);}
.subj-badge{font-size:.68rem;font-weight:600;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.card-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;line-height:1.3;margin-bottom:.4rem;color:var(--ink);}
.card-desc{font-size:.78rem;color:var(--ink2);line-height:1.55;margin-bottom:.9rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.8rem;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:.72rem;font-weight:500;cursor:pointer;transition:opacity .15s;}
.pill:hover{opacity:.75;}
.pill-pdf{background:#ede9f8;color:#6d28d9;}
.pill-video{background:#fee2e2;color:#b91c1c;}
.pill-notes{background:#dcfce7;color:#15803d;}
.pill-ppt{background:#fef3c7;color:#92400e;}
.card-progress{display:flex;align-items:center;gap:8px;padding-top:.7rem;border-top:1px solid var(--border);}
.prog-track{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .6s;}
.prog-label{font-size:.7rem;color:var(--ink3);min-width:28px;text-align:right;}

/* ─── MODAL ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,22,18,.6);z-index:1000;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:900px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;animation:pop .22s ease;}
@keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-head{padding:1.4rem 1.6rem 1rem;border-bottom:1px solid var(--border);}
.modal-head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;}
.modal-lesson-num{font-family:'Fraunces',serif;font-size:.85rem;font-weight:700;color:var(--ink3);margin-bottom:.25rem;}
.modal-title{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;color:var(--ink);line-height:1.2;}
.modal-close{background:var(--surface2);border:none;color:var(--ink2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--border);color:var(--ink);}
.modal-tabs{display:flex;gap:0;overflow-x:auto;padding:0 1.6rem;background:var(--bg);border-bottom:1px solid var(--border);}
.mtab{padding:11px 15px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--ink3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.mtab:hover{color:var(--ink);}
.mtab.active{color:var(--ink);border-bottom-color:var(--ink);}
.modal-body{flex:1;overflow-y:auto;padding:1.5rem 1.6rem;}

/* ─── RESOURCE ITEMS ─── */
.res-item{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--surface2);border-radius:10px;margin-bottom:9px;border:1px solid transparent;transition:border .18s;}
.res-item:hover{border-color:var(--border);}
.res-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.ri-pdf{background:#ede9f8;}
.ri-video{background:#fee2e2;}
.ri-notes{background:#dcfce7;}
.ri-ppt{background:#fef3c7;}
.res-info{flex:1;min-width:0;}
.res-name{font-size:.88rem;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.res-meta{font-size:.73rem;color:var(--ink3);}
.res-btn{padding:5px 13px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;border:1.5px solid currentColor;background:none;transition:all .18s;text-decoration:none;display:inline-block;white-space:nowrap;}
.res-btn:hover{opacity:.75;}
.res-btn-pdf{color:#6d28d9;}
.res-btn-video{color:#b91c1c;}
.res-btn-notes{color:#15803d;}
.res-btn-ppt{color:#92400e;}

/* ─── VIDEO PANEL ─── */
.yt-player{position:relative;padding-bottom:56.25%;height:0;border-radius:10px;overflow:hidden;background:#111;margin-bottom:1rem;}
.yt-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.yt-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem;}
.yt-row{display:flex;align-items:center;gap:10px;padding:9px;background:var(--surface2);border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .18s;}
.yt-row:hover,.yt-row.playing{border-color:rgba(185,28,28,.35);background:#fef2f2;}
.yt-thumb{width:76px;height:43px;border-radius:5px;overflow:hidden;flex-shrink:0;background:#ddd;display:flex;align-items:center;justify-content:center;}
.yt-thumb img{width:100%;height:100%;object-fit:cover;}
.yt-info{flex:1;}
.yt-ttl{font-size:.83rem;font-weight:500;margin-bottom:2px;}
.yt-dur{font-size:.72rem;color:var(--ink3);}
.now-playing{font-size:.68rem;background:#fee2e2;color:#b91c1c;padding:2px 7px;border-radius:4px;}

/* ─── NOTES PANEL ─── */
.notes-ta{width:100%;min-height:160px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:12px 14px;outline:none;resize:vertical;line-height:1.7;}
.notes-ta:focus{border-color:var(--ink2);}
.notes-bar{display:flex;gap:8px;margin-top:9px;align-items:center;}
.btn-pri{padding:7px 18px;background:var(--ink);color:#fff;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}
.btn-pri:hover{opacity:.85;}
.btn-sec{padding:7px 14px;background:none;border:1px solid var(--border);color:var(--ink2);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;}
.btn-sec:hover{color:var(--ink);}
.saved-msg{font-size:.77rem;color:var(--accent3);display:none;margin-left:6px;}

/* ─── EMBED AREA ─── */
.embed-hint{background:var(--surface2);border-radius:10px;padding:1.2rem;margin-top:1rem;}
.embed-hint p{font-size:.8rem;color:var(--ink3);margin-bottom:.7rem;}
.embed-row{display:flex;gap:8px;}
.embed-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:8px 11px;outline:none;}
.embed-input:focus{border-color:var(--ink2);}
.embed-frame{width:100%;min-height:420px;display:none;margin-top:10px;border-radius:10px;overflow:hidden;}
.embed-frame iframe{width:100%;height:450px;border:none;}

/* ─── OVERVIEW PANEL ─── */
.overview-desc{color:var(--ink2);font-size:.9rem;line-height:1.75;margin-bottom:1.5rem;}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:1.5rem;}
.ov-card{background:var(--surface2);border-radius:10px;padding:13px;text-align:center;}
.ov-icon{font-size:1.4rem;margin-bottom:4px;}
.ov-num{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--ink);}
.ov-lbl{font-size:.7rem;color:var(--ink3);margin-top:2px;}
.prog-row{background:var(--surface2);border-radius:10px;padding:1rem;display:flex;align-items:center;gap:12px;}
.prog-row .prog-track{height:6px;}

/* ─── ADD MODAL ─── */
.add-overlay{display:none;position:fixed;inset:0;background:rgba(26,22,18,.6);z-index:1100;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px);}
.add-overlay.open{display:flex;}
.add-modal{background:var(--surface);border-radius:18px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:pop .22s ease;}
.add-modal-head{padding:1.3rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2;}
.add-modal-head h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;}
.add-body{padding:1.3rem 1.5rem;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem;}
.fg label{font-size:.76rem;font-weight:600;color:var(--ink2);}
.fg input,.fg select,.fg textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.86rem;padding:9px 12px;outline:none;transition:border .18s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ink2);}
.fg textarea{resize:vertical;min-height:70px;}
.fg select option{background:var(--surface);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.res-add-list{margin-bottom:.8rem;}
.res-add-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem;}
.res-add-btn{padding:6px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:500;color:var(--ink2);cursor:pointer;}
.res-add-btn:hover{color:var(--ink);}
.res-field-block{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:7px;position:relative;}
.res-field-block input,.res-field-block textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.83rem;padding:8px 10px;outline:none;margin-top:5px;}
.res-field-block textarea{min-height:70px;resize:vertical;}
.res-field-title{font-size:.72rem;font-weight:600;color:var(--ink3);display:flex;justify-content:space-between;align-items:center;}
.res-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:.95rem;}
.form-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:1rem;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:1.8rem;right:1.8rem;background:var(--ink);color:#fff;border-radius:9px;padding:11px 18px;font-size:.84rem;font-weight:500;z-index:3000;opacity:0;transform:translateY(10px);transition:all .28s;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;transform:none;}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:4rem 1rem;color:var(--ink3);}
.empty .ei{font-size:2.5rem;margin-bottom:.8rem;}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:rgba(26,22,18,.2);border-radius:3px;}

@media(max-width:640px){
  header{padding:0 1rem;}
  .hero-band{padding:2rem 1rem 1.8rem;}
  .filter-row,.type-filter,.lessons-wrap{padding-left:1rem;padding-right:1rem;}
  .lesson-grid{grid-template-columns:1fr;}
  .fg-row{grid-template-columns:1fr;}
  .modal-head,.modal-body,.modal-tabs{padding-left:1.1rem;padding-right:1.1rem;}
  .hero-band::after{display:none;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">🔬 Sci<em>&</em>Tech</a>
  <div class="header-search">
    <span style="font-size:.9rem;opacity:.5">⌕</span>
    <input type="text" placeholder="Search lessons…" id="gSearch" oninput="applyFilters()">
  </div>
  <div class="header-right">
    <button class="btn-add" onclick="openAddModal()">＋ Add Lesson</button>
  </div>
</header>

<!-- HERO -->
<div class="hero-band">
  <h1>Science &amp; Technology<br><span>Lessons 1 – 19</span></h1>
  <p>Complete curriculum with PDF publications, video lectures, editable notes, and presentations — all in one place.</p>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-n" id="stat-l">19</div><div class="hstat-l">Lessons</div></div>
    <div class="hstat"><div class="hstat-n" id="stat-r">0</div><div class="hstat-l">Resources</div></div>
    <div class="hstat"><div class="hstat-n">5</div><div class="hstat-l">Subjects</div></div>
    <div class="hstat"><div class="hstat-n">9–10</div><div class="hstat-l">Grade</div></div>
  </div>
</div>

<!-- SUBJECT FILTER -->
<div class="filter-row">
  <button class="subj-btn active" data-s="all" onclick="setSubj('all',this)">🌐 All</button>
  <button class="subj-btn" data-s="physics" onclick="setSubj('physics',this)">⚡ Physics</button>
  <button class="subj-btn" data-s="chemistry" onclick="setSubj('chemistry',this)">⚗ Chemistry</button>
  <button class="subj-btn" data-s="biology" onclick="setSubj('biology',this)">🧬 Biology</button>
  <button class="subj-btn" data-s="math" onclick="setSubj('math',this)">📐 Maths</button>
  <button class="subj-btn" data-s="technology" onclick="setSubj('technology',this)">💻 Technology</button>
  <span class="filter-count" id="fcount"></span>
</div>

<!-- TYPE FILTER -->
<div class="type-filter">
  <button class="type-btn active" data-t="all" onclick="setType('all',this)">All Resources</button>
  <button class="type-btn" data-t="pdf" onclick="setType('pdf',this)">📄 PDF</button>
  <button class="type-btn" data-t="video" onclick="setType('video',this)">▶ Video</button>
  <button class="type-btn" data-t="notes" onclick="setType('notes',this)">📝 Notes</button>
  <button class="type-btn" data-t="ppt" onclick="setType('ppt',this)">📊 PPT</button>
</div>

<!-- LESSON GRID -->
<div class="lessons-wrap">
  <div class="section-title">All Lessons</div>
  <div class="lesson-grid" id="lessonGrid"></div>
</div>

<!-- LESSON MODAL -->
<div class="overlay" id="lessonOverlay" onclick="overlayClick(event,'lessonOverlay',closeLessonModal)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-top">
        <div>
          <div class="modal-lesson-num" id="mLessonNum"></div>
          <div class="modal-title" id="mTitle"></div>
        </div>
        <button class="modal-close" onclick="closeLessonModal()">✕</button>
      </div>
    </div>
    <div class="modal-tabs" id="mTabs"></div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="add-overlay" id="addOverlay" onclick="overlayClick(event,'addOverlay',closeAddModal)">
  <div class="add-modal">
    <div class="add-modal-head">
      <h2>Add New Lesson</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="add-body">
      <div class="fg-row">
        <div class="fg"><label>Lesson Number *</label><input type="number" id="f-num" min="1" placeholder="e.g. 20"></div>
        <div class="fg"><label>Subject *</label>
          <select id="f-subj">
            <option value="">Select…</option>
            <option value="physics">⚡ Physics</option>
            <option value="chemistry">⚗ Chemistry</option>
            <option value="biology">🧬 Biology</option>
            <option value="math">📐 Mathematics</option>
            <option value="technology">💻 Technology</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>Lesson Title *</label><input type="text" id="f-title" placeholder="e.g. Conservation of Energy"></div>
      <div class="fg-row">
        <div class="fg"><label>Topic / Unit</label><input type="text" id="f-unit" placeholder="e.g. Unit 4: Energy"></div>

let lessons = JSON.parse(localStorage.getItem('st_lessons_v2') || 'null');
if (!lessons) { lessons = DEFAULT_LESSONS; save(); }

let curSubj='all', curType='all', curLesson=null, curYt=null, addResCount=0;

// ── Helpers ──
function save(){ localStorage.setItem('st_lessons_v2', JSON.stringify(lessons)); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function overlayClick(e,id,fn){ if(e.target===document.getElementById(id)) fn(); }

function progColor(s){ return SUBJ[s]?.color||'#888'; }

// ── Stats ──
function updateStats(){
  document.getElementById('stat-l').textContent = lessons.length;
  const total = lessons.reduce((a,l)=>a+(l.resources||[]).length,0);
  document.getElementById('stat-r').textContent = total;
}

// ── Render cards ──
function applyFilters(){
  const q = document.getElementById('gSearch').value.toLowerCase();
  const list = lessons.filter(l=>{
    const ms = curSubj==='all'||l.subject===curSubj;
    const mt = curType==='all'||(l.resources||[]).some(r=>r.type===curType);
    const mq = !q||l.title.toLowerCase().includes(q)||(l.unit||'').toLowerCase().includes(q);
    return ms&&mt&&mq;
  });
  document.getElementById('fcount').textContent = list.length+' lesson'+(list.length!==1?'s':'');
  const grid = document.getElementById('lessonGrid');
  if(!list.length){ grid.innerHTML='<div class="empty"><div class="ei">🔭</div><p>No lessons match this filter.</p></div>'; return; }
  grid.innerHTML = list.map(l=>{
    const s = SUBJ[l.subject]||{color:'#888',bg:'#eee',text:'#333',icon:'📘'};
    const res = l.resources||[];
    const types=[...new Set(res.map(r=>r.type))];
    const pills=types.map(t=>{
      const lbl={pdf:'📄 PDF',video:'▶ Video',notes:'📝 Notes',ppt:'📊 PPT'}[t]||t;
      const cnt=res.filter(r=>r.type===t).length;
      return `<span class="pill pill-${t}" onclick="event.stopPropagation();openLesson(${l.id},'${t}')">${lbl} ${cnt}</span>`;
    }).join('');
    return `<div class="lesson-card" onclick="openLesson(${l.id},'overview')">
      <div class="card-stripe" style="background:${s.color}"></div>
      <div class="card-inner">
        <div class="card-top">
          <div class="lesson-number">L${l.num}</div>
          <span class="subj-badge" style="background:${s.bg};color:${s.text}">${s.icon} ${cap(l.subject)}</span>
        </div>
        <div class="card-title">${l.title}</div>
        <div class="card-desc">${l.desc||''}</div>
        <div class="card-pills">${pills}</div>
        <div class="card-progress">
          <div class="prog-track"><div class="prog-fill" style="width:${l.progress||0}%;background:${s.color}"></div></div>
          <span class="prog-label">${l.progress||0}%</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setSubj(s,el){ curSubj=s; document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); applyFilters(); }
function setType(t,el){ curType=t; document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); applyFilters(); }

// ── Lesson modal ──
function openLesson(id, tab){
  curLesson = lessons.find(l=>l.id===id);
  if(!curLesson) return;
  const l=curLesson, s=SUBJ[l.subject]||{};
  curYt = (l.resources||[]).find(r=>r.type==='video')?.ytid||null;
  document.getElementById('mLessonNum').innerHTML = `<span style="background:${s.bg||'#eee'};color:${s.text||'#333'};padding:2px 10px;border-radius:5px;font-size:.72rem;font-weight:700;letter-spacing:.05em">${s.icon||'📘'} ${cap(l.subject)}</span>&nbsp; Lesson ${l.num} &nbsp;•&nbsp; ${l.grade||''}`;
  document.getElementById('mTitle').textContent = l.title;
  const res=l.resources||[];
  const tabDefs=[{k:'overview',lbl:'📋 Overview'},
    ...(res.some(r=>r.type==='pdf')?[{k:'pdf',lbl:'📄 PDFs'}]:[]),
    ...(res.some(r=>r.type==='video')?[{k:'video',lbl:'▶ Videos'}]:[]),
    ...(res.some(r=>r.type==='notes')?[{k:'notes',lbl:'📝 Notes'}]:[]),
    ...(res.some(r=>r.type==='ppt')?[{k:'ppt',lbl:'📊 PPT'}]:[]),
  ];
  document.getElementById('mTabs').innerHTML = tabDefs.map(td=>
    `<button class="mtab${tab===td.k?' active':''}" onclick="switchMTab('${td.k}',this)">${td.lbl}</button>`
  ).join('');
  renderTab(tab);
  document.getElementById('lessonOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function switchMTab(k,el){ document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); renderTab(k); }
function closeLessonModal(){ document.getElementById('lessonOverlay').classList.remove('open'); document.body.style.overflow=''; curYt=null; }

function renderTab(k){
  const l=curLesson, res=l.resources||[], s=SUBJ[l.subject]||{};
  let html='';
  if(k==='overview'){
    const cnts={pdf:0,video:0,notes:0,ppt:0}; res.forEach(r=>{ if(cnts[r.type]!==undefined) cnts[r.type]++; });
    const cards=Object.entries(cnts).filter(([,n])=>n).map(([t,n])=>`
      <div class="ov-card"><div class="ov-icon">${{pdf:'📄',video:'▶️',notes:'📝',ppt:'📊'}[t]}</div><div class="ov-num">${n}</div><div class="ov-lbl">${cap(t)}</div></div>`).join('');
    html=`<p class="overview-desc">${l.desc||''}</p>
      <div class="ov-grid">${cards}</div>
      <div class="prog-row">
        <span style="font-size:.82rem;color:var(--ink2)">Progress</span>
        <div class="prog-track" style="flex:1;height:6px"><div class="prog-fill" style="width:${l.progress||0}%;background:${s.color||'#888'}"></div></div>
        <span style="font-size:.82rem;font-weight:600;color:${s.color||'#888'}">${l.progress||0}%</span>
        <button class="btn-sec" style="font-size:.76rem;padding:5px 12px" onclick="updateProgress(${l.id})">Edit</button>
      </div>`;
  } else if(k==='pdf'){
    const pdfs=res.filter(r=>r.type==='pdf');
    html=pdfs.map(p=>`<div class="res-item"><div class="res-icon ri-pdf">📄</div><div class="res-info"><div class="res-name">${p.name}</div><div class="res-meta">${p.size||'PDF'}</div></div><a class="res-btn res-btn-pdf" href="${p.url||'#'}" target="_blank">Open ↗</a></div>`).join('')
    +`<div class="embed-hint"><p>Paste a PDF URL to embed it here (Google Drive share link, direct .pdf URL, etc.)</p>
      <div class="embed-row"><input class="embed-input" id="pdfUrl" placeholder="https://…/document.pdf"><button class="btn-pri" onclick="embedItem('pdf')">Embed</button></div>
      <div class="embed-frame" id="pdfFrame"></div></div>`;
  } else if(k==='video'){
    const vids=res.filter(r=>r.type==='video');
    const player=curYt?`<div class="yt-player"><iframe src="https://www.youtube.com/embed/${curYt}?rel=0" allowfullscreen></iframe></div>`:'';
    const list=vids.map(v=>`<div class="yt-row${curYt===v.ytid?' playing':''}" onclick="playVid('${v.ytid}',this)">
      <div class="yt-thumb"><img src="https://img.youtube.com/vi/${v.ytid}/mqdefault.jpg" alt="" onerror="this.style.display='none'"></div>
      <div class="yt-info"><div class="yt-ttl">${v.name}</div><div class="yt-dur">${v.duration||''}</div></div>
      ${curYt===v.ytid?'<span class="now-playing">▶ Now playing</span>':''}
    </div>`).join('');
    html=player+`<div class="yt-list">${list}</div>
      <div class="embed-hint"><p>Add a YouTube video by URL:</p>
      <div class="embed-row">
        <input class="embed-input" id="ytUrl" placeholder="https://www.youtube.com/watch?v=…">
        <input class="embed-input" id="ytTitle" placeholder="Video title" style="max-width:180px">
        <button class="btn-pri" onclick="addYtVideo()">Add</button>
      </div></div>`;
  } else if(k==='notes'){
    const notes=res.filter(r=>r.type==='notes');
    if(!notes.length){ html='<div class="empty"><div class="ei">📝</div><p>No notes for this lesson yet.</p></div>'; }
    else html=notes.map((n,i)=>`
      <div style="margin-bottom:1.3rem">
        <div style="font-size:.85rem;font-weight:600;margin-bottom:7px">${n.name}</div>
        <textarea class="notes-ta" id="note${i}" rows="12">${n.content||''}</textarea>
        <div class="notes-bar">
          <button class="btn-pri" onclick="saveNote(${l.id},${i})">Save</button>
          <button class="btn-sec" onclick="navigator.clipboard.writeText(document.getElementById('note${i}').value).then(()=>toast('Copied!'))">Copy</button>
          <span class="saved-msg" id="savedMsg${i}">✓ Saved!</span>
        </div>
      </div>`).join('');
  } else if(k==='ppt'){
    const ppts=res.filter(r=>r.type==='ppt');
    html=ppts.map(p=>`<div class="res-item"><div class="res-icon ri-ppt">📊</div><div class="res-info"><div class="res-name">${p.name}</div><div class="res-meta">${p.slides||'Presentation'}</div></div><a class="res-btn res-btn-ppt" href="${p.url||'#'}" target="_blank">Open ↗</a></div>`).join('')
    +`<div class="embed-hint"><p>Embed a Google Slides or OneDrive PowerPoint URL:</p>
      <div class="embed-row"><input class="embed-input" id="pptUrl" placeholder="https://docs.google.com/presentation/d/…/embed"><button class="btn-pri" onclick="embedItem('ppt')">Embed</button></div>
      <div class="embed-frame" id="pptFrame"></div></div>`;
  }
  document.getElementById('mBody').innerHTML=html;
}

function playVid(ytid,el){ curYt=ytid; renderTab('video'); }

function addYtVideo(){
  const url=(document.getElementById('ytUrl')||{}).value?.trim();
  const title=(document.getElementById('ytTitle')||{}).value?.trim()||'Untitled Video';
  if(!url) return;
  const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  const ytid=m?m[1]:url;
  const l=lessons.find(x=>x.id===curLesson.id);
  l.resources.push({type:'video',name:title,ytid,duration:''});
  curLesson=l; save(); curYt=ytid; renderTab('video'); toast('Video added!');
}

function embedItem(type){
  const urlEl = document.getElementById(type+'Url');
  const frameEl = document.getElementById(type+'Frame');
  if(!urlEl||!frameEl) return;
  const url=urlEl.value.trim(); if(!url) return;
  frameEl.style.display='block';
  const embedUrl = (type==='ppt'&&url.includes('docs.google.com')) ? url.replace('/edit','/embed').replace('/pub','/embed') : url;
  frameEl.innerHTML=`<iframe src="${embedUrl}" allowfullscreen></iframe>`;
}

function saveNote(lid,i){
  const val=document.getElementById('note'+i)?.value||'';
  const l=lessons.find(x=>x.id===lid);
  l.resources.filter(r=>r.type==='notes')[i].content=val;
  curLesson=l; save();
  const m=document.getElementById('savedMsg'+i); if(m){m.style.display='inline'; setTimeout(()=>m.style.display='none',2000);}
}

function updateProgress(id){
  const cur=lessons.find(l=>l.id===id).progress||0;
  const v=prompt('Update progress % (0–100):',cur); if(v===null) return;
  const p=Math.min(100,Math.max(0,parseInt(v)||0));
  lessons.find(l=>l.id===id).progress=p; curLesson=lessons.find(l=>l.id===id);
  save(); renderTab('overview'); applyFilters(); toast('Progress updated!');
}

// ── Add lesson modal ──
function openAddModal(){ document.getElementById('addOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeAddModal(){ document.getElementById('addOverlay').classList.remove('open'); document.body.style.overflow=''; }

function addResField(type){
  const id=addResCount++;
  const labels={pdf:'PDF URL / Link',video:'YouTube URL',notes:'Notes text',ppt:'PPT URL / Google Slides link'};
  const div=document.createElement('div'); div.className='res-field-block'; div.id='rf'+id;
  div.innerHTML=`<div class="res-field-title">
    <span>${{pdf:'📄 PDF',video:'▶ Video',notes:'📝 Notes',ppt:'📊 PPT'}[type]}</span>
    <button class="res-del" onclick="document.getElementById('rf${id}').remove()">✕</button>
  </div>
  <input type="hidden" value="${type}" id="rft${id}">
  <input type="text" placeholder="Name / Title" id="rfn${id}">
  ${type==='notes'?`<textarea placeholder="${labels[type]}" id="rfc${id}"></textarea>`:`<input type="text" placeholder="${labels[type]}" id="rfu${id}">`}`;
  document.getElementById('resAddList').appendChild(div);
}

function submitLesson(){
  const title=document.getElementById('f-title').value.trim();
  const subj=document.getElementById('f-subj').value;
  const num=parseInt(document.getElementById('f-num').value)||lessons.length+1;
  if(!title||!subj){toast('Please fill in title and subject.'); return;}
  const resources=[];
  document.querySelectorAll('[id^="rft"]').forEach(el=>{
    const id=el.id.replace('rft','');
    const type=el.value;
    const name=document.getElementById('rfn'+id)?.value.trim()||'Untitled';
    if(type==='notes') resources.push({type,name,content:document.getElementById('rfc'+id)?.value||''});
    else {
      const url=document.getElementById('rfu'+id)?.value.trim()||'#';
      const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(type==='video'&&m) resources.push({type,name,ytid:m[1],duration:''});
      else resources.push({type,name,url,size:type==='pdf'?'PDF':type==='ppt'?'Presentation':''});
    }
  });
  const lesson={id:Date.now(),num,subject:subj,
    title,unit:document.getElementById('f-unit').value.trim(),
    grade:document.getElementById('f-grade').value.trim(),
    desc:document.getElementById('f-desc').value.trim(),
    progress:0,resources};
  lessons.push(lesson);
  lessons.sort((a,b)=>a.num-b.num);
  save(); closeAddModal(); applyFilters(); updateStats();
  ['f-title','f-subj','f-num','f-unit','f-grade','f-desc'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('resAddList').innerHTML='';
  toast('Lesson '+num+' added!');
}

// ── Init ──
updateStats();
applyFilters();
</script>
</body>
</html>
